name: Build Router Firmware

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release Type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - prerelease
          - none
      release_notes:
        description: 'Release Notes'
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 10

      - name: Get current date
        id: date
        run: |
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Get commit hash
        id: commit
        run: |
          echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "full=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Setup build environment
        run: |
          sudo apt update
          sudo apt install -y build-essential clang gcc g++ binutils bzip2 gawk gettext git libncurses-dev libssl-dev python3 python3-setuptools rsync unzip wget xsltproc zlib1g-dev file which perl sed make

      - name: Install feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure
        run: |
          cp config.seed .config
          make defconfig

      - name: Download sources
        run: make download -j$(nproc)

      - name: Build Firmware
        run: |
          make -j2 world 2>&1 | tee build.log

      - name: Check build status
        run: |
          if [ -f build.log ]; then
            tail -100 build.log
          fi
          echo "=== List all files in bin/targets/airoha/an7581/ ==="
          ls -la bin/targets/airoha/an7581/ 2>/dev/null || echo "No files found in an7581 directory"
          echo "=== List all files in bin/targets/airoha/ ==="
          ls -la bin/targets/airoha/ 2>/dev/null || echo "No files found in airoha directory"
          echo "=== List all files in bin/targets/ ==="
          ls -la bin/targets/ 2>/dev/null || echo "No files found in targets directory"
          echo "=== List all files in bin/ ==="
          ls -la bin/ 2>/dev/null || echo "No files found in bin directory"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: router-firmware
          path: |
            bin/targets/airoha/an7581/*.itb
            bin/targets/airoha/an7581/config.buildinfo
            bin/targets/airoha/an7581/feeds.buildinfo
            bin/targets/airoha/an7581/version.buildinfo
            bin/targets/airoha/an7581/sha256sums
          retention-days: 30
        if: always()

      - name: Create Release
        if: github.event.inputs.release_type != 'none'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ format('{0}-{1}', steps.date.outputs.date, steps.commit.outputs.short) }}
          name: ${{ format('{0} - XR1710G Build ({1})', steps.date.outputs.date, steps.commit.outputs.short) }}
          body: ${{ github.event.inputs.release_notes }}
          draft: false
          prerelease: ${{ github.event.inputs.release_type == 'prerelease' }}
          files: |
            bin/targets/airoha/an7581/*.itb
            bin/targets/airoha/an7581/config.buildinfo
            bin/targets/airoha/an7581/feeds.buildinfo
            bin/targets/airoha/an7581/version.buildinfo
            bin/targets/airoha/an7581/sha256sums
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
