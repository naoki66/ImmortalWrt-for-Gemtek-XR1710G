name: Sync Upstream ImmortalWrt

on:
  schedule:
    - cron: '0 19 */3 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/immortalwrt/immortalwrt.git 2>/dev/null || true
          git remote set-url upstream https://github.com/immortalwrt/immortalwrt.git

      - name: Fetch upstream
        run: git fetch upstream master

      - name: Check for updates
        id: check
        run: |
          LOCAL=$(git rev-parse HEAD)
          REMOTE=$(git rev-parse upstream/master)
          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "No updates available (local: ${LOCAL:0:7}, remote: ${REMOTE:0:7})"
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          else
            echo "Updates available: ${LOCAL:0:7} -> ${REMOTE:0:7}"
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge upstream
        if: steps.check.outputs.has_updates == 'true'
        run: |
          git merge --no-edit upstream/master || {
            echo "::error::Merge failed. Conflicts need manual resolution."
            git diff --name-only --diff-filter=U
            exit 1
          }

      - name: Push to origin
        if: steps.check.outputs.has_updates == 'true'
        run: git push origin master

      - name: Show result
        if: always()
        run: |
          echo "=== Sync Result ==="
          git log --oneline -5 || true
          echo "=== Remote Status ==="
          git remote -v || true
